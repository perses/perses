kind: Dashboard
metadata:
    name: withoutVariable
    createdAt: 0001-01-01T00:00:00Z
    updatedAt: 0001-01-01T00:00:00Z
    version: 0
    project: MyProject
spec:
    display:
        name: Without Variable
    datasources:
        promDemo:
            default: false
            plugin:
                kind: PrometheusDatasource
                spec:
                    directUrl: http://localhost:9090
    panels:
        "0_0":
            kind: Panel
            spec:
                display:
                    name: CPU Usage
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        yAxis:
                            format:
                                unit: decimal
                queries:
                    - kind: TimeSeriesQuery
                      spec:
                        plugin:
                            kind: PrometheusTimeSeriesQuery
                            spec:
                                query: sum by(instance) (rate(avalanche_counter_metric_mmmmm_0_0_total[5m]))
                                seriesNameFormat: '{{instance}}'
        "0_1":
            kind: Panel
            spec:
                display:
                    name: Memory Usage
                plugin:
                    kind: TimeSeriesChart
                    spec:
                        yAxis:
